
<style>
  .socials-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 1.5rem 0;
    justify-content: center;
  }
  .social-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 110px;
    height: 100px;
    border-radius: 16px;
    border: 0.5px solid var(--border);
    background: var(--surface-2);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .social-card:hover {
    transform: translateY(-4px);
    border-color: var(--border-strong);
    background: var(--surface-1);
  }
  .social-card:active { transform: translateY(-2px) scale(0.98); }
  .social-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .social-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }
  .social-card:hover .social-label { color: var(--text-primary); }

  .ln  .social-icon { background: #E8F0FB; }
  .yt  .social-icon { background: #FDE8E8; }
  .gm  .social-icon { background: #FDE8E8; }
  .dc  .social-icon { background: #EEEDFB; }
  .pf  .social-icon { background: #E8F5EE; }

  @media (prefers-color-scheme: dark) {
    .ln  .social-icon { background: #0C2240; }
    .yt  .social-icon { background: #3B1414; }
    .gm  .social-icon { background: #3B1414; }
    .dc  .social-icon { background: #1E1C3A; }
    .pf  .social-icon { background: #0E2A1A; }
  }

  .divider-line {
    width: 0.5px;
    height: 60px;
    background: var(--border);
    align-self: center;
  }

  .copied-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-3);
    border: 0.5px solid var(--border-strong);
    color: var(--text-primary);
    font-size: 13px;
    padding: 8px 16px;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 99;
  }
  .copied-toast.show { opacity: 1; }
</style>
